<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — EmpSphere</title>
  <meta name="description" content="Sign in to EmpSphere Employee Management System" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e1a; --bg2: #0f1525; --surface: #141929; --surface2: #1a2035;
      --border: #1f2d4a; --accent: #6366f1; --accent2: #8b5cf6; --gold: #f59e0b;
      --text: #e2e8f0; --text2: #94a3b8; --success: #10b981; --danger: #ef4444;
    }
    body {
      font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 30% 40%, rgba(99,102,241,0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 60%, rgba(139,92,246,0.1) 0%, transparent 60%);
    }
    .container {
      background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
      padding: 2.5rem; width: 100%; max-width: 440px; position: relative; z-index: 1;
      animation: fadeIn 0.5s ease;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
    .brand { text-align: center; margin-bottom: 2rem; }
    .brand .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .brand h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(135deg, #e2e8f0, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .brand p { color: var(--text2); font-size: 0.9rem; margin-top: 0.3rem; }
    .tabs { display: flex; background: var(--bg2); border-radius: 12px; padding: 4px; margin-bottom: 1.5rem; }
    .tab { flex: 1; padding: 0.6rem; border: none; background: none; color: var(--text2); cursor: pointer; border-radius: 9px; font-size: 0.9rem; font-weight: 500; transition: all 0.2s; font-family: inherit; }
    .tab.active { background: var(--accent); color: white; }
    label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--text2); margin-bottom: 0.4rem; }
    .input-wrap { position: relative; margin-bottom: 1rem; }
    input {
      width: 100%; padding: 0.75rem 1rem; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    input::placeholder { color: var(--text2); }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1.1rem; }
    .btn-primary {
      width: 100%; padding: 0.85rem; border: none; border-radius: 12px; cursor: pointer;
      font-size: 1rem; font-weight: 700; font-family: inherit;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; margin-top: 0.5rem; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert { padding: 0.75rem 1rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .footer-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text2); }
    .footer-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .admin-hint { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.2); border-radius: 10px; padding: 0.8rem; margin-bottom: 1rem; font-size: 0.8rem; color: #fcd34d; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">
      <div class="icon">🏢</div>
      <h1>EmpSphere</h1>
      <p>Sign in to your account</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-employee" onclick="switchTab('employee')">👤 Employee</button>
      <button class="tab" id="tab-admin" onclick="switchTab('admin')">👨‍💼 Admin</button>
    </div>

    <div id="admin-hint" class="admin-hint" style="display:none;">
      🔑 Admin: <strong>Admin@gmail.com</strong> / <strong>AdminPassword123</strong>
    </div>

    <div id="alert" class="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="input-wrap">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="input-wrap">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required autocomplete="current-password" />
        <button type="button" class="eye-btn" onclick="togglePwd()">👁</button>
      </div>
      <button type="submit" class="btn-primary" id="submit-btn">Sign In →</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="/signup.html">Sign Up</a>
    </div>
    <div class="footer-link" style="margin-top:0.5rem;">
      <a href="/index.html">← Back to Home</a>
    </div>
  </div>

  <script>
    const API = '';
    let activeTab = 'employee';

    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-employee').classList.toggle('active', tab === 'employee');
      document.getElementById('tab-admin').classList.toggle('active', tab === 'admin');
      document.getElementById('admin-hint').style.display = tab === 'admin' ? 'block' : 'none';
      if (tab === 'admin') {
        document.getElementById('email').value = 'Admin@gmail.com';
        document.getElementById('password').value = 'AdminPassword123';
      } else {
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
      }
      hideAlert();
    }

    function togglePwd() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
      el.style.display = 'block';
    }

    function hideAlert() {
      document.getElementById('alert').style.display = 'none';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';
      hideAlert();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.message || 'Login failed', 'error');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('role', data.role);
        localStorage.setItem('name', data.name);
        localStorage.setItem('userId', data._id);
        if (data.employeeId) localStorage.setItem('employeeId', data.employeeId);

        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(() => {
          window.location.href = data.role === 'admin' ? '/admin.html' : '/employee.html';
        }, 800);
      } catch (err) {
        showAlert('Network error. Make sure the server is running.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In →';
      }
    }

    // Check if already logged in
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    if (token && role === 'admin') window.location.href = '/admin.html';
    else if (token && role === 'employee') window.location.href = '/employee.html';
  </script>
</body>
</html>
